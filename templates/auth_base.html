<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ИИ Анализ{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-orb auth-orb-3"></div>
  </div>

  <div class="auth-layout">
    <div class="auth-hero">
      <div class="auth-hero-badge">AI POWERED</div>
      <h1>ИИ Анализ<br><span>разговоров</span></h1>
      <p>Загружайте записи — ИИ найдёт ошибки, даст рекомендации и оценит каждый диалог по 5 критериям.</p>
      <div class="auth-hero-features">
        <div class="auth-hero-feat"><span>🤖</span> Автоанализ</div>
        <div class="auth-hero-feat"><span>📊</span> Оценки и прогресс</div>
        <div class="auth-hero-feat"><span>💬</span> ИИ-помощник</div>
      </div>
    </div>

    <div class="auth-card">
      {% block auth_content %}{% endblock %}
    </div>
  </div>
</body>
</html>
